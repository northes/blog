baseURL = "https://northes.io/"
defaultContentLanguage = "zh-cn"
title = "Ethan Tam"
theme = "hugo-twilson"
enableRobotsTXT = true
enableGitInfo = false

[languages.zh-cn]
label = "简体中文"
weight = 1
locale = "zh-CN"

[pagination]
pagerSize = 20

[params]
github = "https://github.com/northes"
siteKeyword = "ethan,northes,Northes,blog,博客"
siteDesc = "Ethan's Blog,Ethan的博客。记录学习笔记以及过程中踩过的坑"
siteAuthor = "Ethan"

# hugo-twilson 主题配置（模板通过 .Site.Params.twilson 读取）
[params.twilson]
accentColor = "#F53003"
mainSections = ["posts"]
showRecentPosts = 10
role = "Agent Engineer"

[menu]
header = [
    { name = "Articles", url = "/articles/", weight = 1 },
    { name = "Tags", url = "/tags/", weight = 2 },
    { name = "Projects", url = "/projects/", weight = 3 },
    { name = "About", url = "/about/", weight = 4 },
]

[markup.highlight]
noClasses = false
lineNos = true

[markup.goldmark.renderer]
unsafe = true

[outputs]
home = ["HTML", "RSS", "JSON"]
